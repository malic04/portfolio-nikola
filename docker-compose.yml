services:
  app:
    build: .
    container_name: nikola_app
    restart: unless-stopped
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    # Reload nginx every 6h to pick up renewed certs
    command: >
      /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done &
      nginx -g 'daemon off;'"
    depends_on:
      - certbot

  certbot:
    image: certbot/certbot:latest
    container_name: nikola_certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Renew certs every 12h
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do certbot renew; sleep 12h & wait $${!}; done"
